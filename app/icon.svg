<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Hatcher v3 favicon — terminal mono+phosphor.
       Outer dark square + inner phosphor-green block, matching the
       Nav/Footer BrandGlyph component. -->
  <rect width="32" height="32" rx="6" fill="#0A0A0A"/>
  <rect x="3" y="3" width="26" height="26" rx="5" fill="none" stroke="#E6E6E6" stroke-width="1.5"/>
  <rect x="9" y="9" width="14" height="14" rx="2" fill="#39FF88"/>
  <!-- Subtle phosphor glow halo around the inner block, kept subtle so
       the glyph still reads at 16px. -->
  <rect x="9" y="9" width="14" height="14" rx="2" fill="none" stroke="#39FF88" stroke-opacity="0.35" stroke-width="2"/>
</svg>
